<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adapti</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-circle">A</div>
      <div>
        <div class="logo-title">Adapti</div>
        <div class="logo-sub">Adapt. Prioritise. Succeed.</div>
      </div>
    </div>

    <nav>
      <a href="#dashboard" class="nav-link">Dashboard</a>
      <a href="#tasks"     class="nav-link">Add Task</a>
      <a href="#calendar"  class="nav-link">Calendar</a>
      <a href="#timer"     class="nav-link">Timer</a>
      <a href="#about"     class="nav-link">About</a>
    </nav>

    <div class="sidebar-actions">
      <button id="importBtn" class="side-btn">Import JSON</button>
      <input  id="fileInput" type="file" accept="application/json" hidden />
      <button id="exportBtn" class="side-btn">Export JSON</button>
      <div    id="statusMsg" class="status-msg">Ready</div>
    </div>
  </div>

  <div class="main">
    <div id="app"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
